<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キクチエステート 通帳CSV摘要ツール</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>通帳CSV 摘要付与ツール</h1>
    <p class="subtitle">キクチエステート用 / 通帳取引CSVを取り込み、摘要を入力してCSV出力します</p>
  </header>

  <main>
    <section id="import-section" class="card">
      <h2>1. 通帳データを取り込む</h2>

      <div class="tabs">
        <button type="button" class="tab active" data-tab="file">CSVファイルから</button>
        <button type="button" class="tab" data-tab="paste">コピー＆貼り付けから</button>
      </div>

      <div id="tab-file" class="tab-panel">
        <div id="dropzone" class="dropzone">
          <p>ここにCSVファイルをドラッグ＆ドロップ</p>
          <p>または</p>
          <label class="btn">
            ファイルを選択
            <input type="file" id="file-input" accept=".csv,text/csv" hidden>
          </label>
          <p class="hint">Shift-JIS / UTF-8 どちらの文字コードでも読み込めます</p>
        </div>
      </div>

      <div id="tab-paste" class="tab-panel hidden">
        <p class="hint">ネットバンキングの取引明細をマウスでドラッグして選択しコピー（Ctrl+C）し、下の欄に貼り付け（Ctrl+V）て「取り込む」を押してください。</p>
        <textarea id="paste-area" rows="8" placeholder="ここに取引明細を貼り付け..."></textarea>
        <button type="button" id="paste-btn" class="btn btn-primary">取り込む</button>
      </div>

      <label class="checkbox">
        <input type="checkbox" id="has-header" checked>
        1行目を見出し（項目名）として扱う
      </label>
      <p id="file-status" class="status"></p>
    </section>

    <section id="edit-section" class="card hidden">
      <h2>2. 摘要を入力する</h2>
      <p class="hint">「摘要」列のセルをクリックして入力できます。行の削除も可能です。</p>
      <div class="table-wrap">
        <table id="data-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="export-section" class="card hidden">
      <h2>3. CSVを出力する</h2>
      <label class="field">
        出力ファイル名
        <input type="text" id="export-name" value="摘要付き通帳データ.csv">
      </label>
      <button id="export-btn" class="btn btn-primary">CSVをダウンロード</button>
      <p id="export-status" class="status"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
